production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  close_expired_registrations:
    # Stub entry — job implemented in Story 3.1. Schedule added now so Solid Queue loads it.
    # midnight Asia/Bangkok (UTC+7 → 17:00 UTC)
    class: CloseExpiredRegistrationsJob
    queue: default
    schedule: every day at 17:00
  send_event_reminders:
    # Stub entry — job implemented in Story 3.8. Schedule added now so Solid Queue loads it.
    # 8:00am Asia/Bangkok (UTC+7 → 01:00 UTC)
    class: SendEventRemindersJob
    queue: default
    schedule: every day at 01:00
