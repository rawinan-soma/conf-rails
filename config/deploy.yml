# Name of your application. Used to uniquely configure containers.
service: conf-rails

# Name of the container image.
image: your-docker-user/conf-rails

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
  # Solid Queue job processor (uncomment when scaling horizontally)
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt (Thruster handles TLS termination).
# Requires config.assume_ssl = true and config.force_ssl = true in production.rb.
proxy:
  ssl: true
  host: conf.example.com

# Where you keep your container images.
registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - OIDC_CLIENT_SECRET
    - SMTP_PASSWORD
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, split job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true
    RAILS_LOG_LEVEL: info

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage volume for Active Storage files.
volumes:
  - "conf_rails_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  # Pass build-time arguments (no secrets in args)
  # args:
  #   RUBY_VERSION: 4.0.5
